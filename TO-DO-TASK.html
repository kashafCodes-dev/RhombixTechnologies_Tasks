<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus. – To-Do App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #080808;
      color: hsl(45, 60%, 92%);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animations ── */
    @keyframes orb-float-1 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(40px,-30px) scale(1.08); }
      66%  { transform: translate(-20px,20px) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orb-float-2 {
      0%   { transform: translate(0,0) scale(1); }
      40%  { transform: translate(-35px,25px) scale(1.06); }
      70%  { transform: translate(25px,-15px) scale(0.94); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orb-float-3 {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(20px,30px) scale(1.1); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes gold-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-glow {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    @keyframes particle-drift {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-120px) translateX(20px); opacity: 0; }
    }
    @keyframes title-shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-16px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Layout ── */
    .app-wrapper {
      min-height: 100dvh;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow: hidden;
    }

    /* ── Orbs ── */
    .orb {
      pointer-events: none;
      position: absolute;
      border-radius: 50%;
    }
    .orb-1 {
      top: -80px; left: -100px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, #6b1a2e, transparent 70%);
      opacity: 0.30;
      filter: blur(110px);
      animation: orb-float-1 14s ease-in-out infinite;
    }
    .orb-2 {
      bottom: -60px; right: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b2342, transparent 70%);
      opacity: 0.20;
      filter: blur(100px);
      animation: orb-float-2 18s ease-in-out infinite;
    }
    .orb-3 {
      top: 35%; right: 5%;
      width: 220px; height: 220px;
      background: radial-gradient(circle, #b8860b, transparent 70%);
      opacity: 0.15;
      filter: blur(80px);
      animation: orb-float-3 11s ease-in-out infinite;
    }

    /* ── Gold top line ── */
    .gold-line {
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #b8860b 20%, #ffd700 50%, #b8860b 80%, transparent 100%);
      background-size: 200% auto;
      animation: gold-shimmer 4s linear infinite;
    }

    /* ── Particle ── */
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #d4af37;
      animation: particle-drift linear infinite;
      pointer-events: none;
    }

    /* ── Main column ── */
    .main-col {
      width: 100%;
      max-width: 512px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: relative;
      z-index: 10;
    }

    /* ── Header ── */
    header { display: flex; flex-direction: column; gap: 8px; padding-top: 24px; animation: fade-in .5s ease both; }
    .header-row { display: flex; align-items: center; gap: 12px; }
    .crown-icon { color: #d4af37; flex-shrink: 0; }
    .title {
      font-size: 3rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(90deg, #b8860b 0%, #ffd700 25%, #f5c842 50%, #d4af37 75%, #ffd700 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: title-shimmer 3s linear infinite;
    }
    .tagline {
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #b8860b; padding-left: 4px;
    }
    .divider { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .divider-line { height: 1px; background: #d4af37; }
    .divider-line-left { width: 32px; }
    .divider-line-right { flex: 1; opacity: 0.2; }
    .divider-diamond {
      width: 6px; height: 6px;
      background: #d4af37;
      transform: rotate(45deg);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    /* ── Input form ── */
    .input-form { position: relative; animation: fade-in .4s .1s ease both; }
    .task-input {
      width: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      padding: 16px 64px 16px 20px;
      border-radius: 16px;
      outline: none;
      background: rgba(107,26,46,0.18);
      border: 1px solid rgba(212,175,55,0.2);
      color: hsl(45,60%,92%);
      backdrop-filter: blur(16px);
      transition: border .2s, box-shadow .2s;
    }
    .task-input::placeholder { color: rgba(212,175,55,0.4); }
    .task-input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 22px rgba(212,175,55,0.25), inset 0 0 12px rgba(212,175,55,0.04);
    }
    .add-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 12px;
      border: none; cursor: pointer;
      background: linear-gradient(135deg, #ffd700, #d4af37, #b8860b);
      box-shadow: 0 0 20px rgba(212,175,55,0.5);
      color: #080808;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, opacity .2s;
      font-size: 22px; font-weight: 300; line-height: 1;
    }
    .add-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .add-btn:not(:disabled):hover { transform: translateY(-50%) scale(1.08); }
    .add-btn:not(:disabled):active { transform: translateY(-50%) scale(0.92); }

    /* ── Filters bar ── */
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      animation: fade-in .4s .2s ease both;
    }
    .filter-tabs {
      display: flex; gap: 4px; padding: 4px;
      background: rgba(107,26,46,0.25);
      border: 1px solid rgba(212,175,55,0.12);
      border-radius: 12px;
    }
    .filter-btn {
      padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.875rem; font-weight: 700;
      text-transform: capitalize; transition: all .2s;
      background: transparent; color: rgba(212,175,55,0.5);
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #ffd700, #d4af37, #b8860b);
      color: #080808;
      box-shadow: 0 0 14px rgba(212,175,55,0.45);
    }
    .task-count { font-size: 0.875rem; font-weight: 700; color: rgba(212,175,55,0.55); }
    .task-count span { color: #d4af37; }

    /* ── Task list ── */
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .task-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px; border-radius: 16px;
      backdrop-filter: blur(14px);
      background: rgba(107,26,46,0.22);
      border: 1px solid rgba(212,175,55,0.18);
      transition: box-shadow .2s, border .2s, transform .15s;
      animation: slide-in .3s ease both;
    }
    .task-item.completed-item {
      background: rgba(107,26,46,0.10);
      border-color: rgba(212,175,55,0.08);
    }
    .task-item:not(.completed-item):hover {
      box-shadow: 0 0 18px rgba(212,175,55,0.12);
      border-color: rgba(212,175,55,0.35);
      transform: scale(1.012);
    }

    /* ── Checkbox ── */
    .checkbox {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; background: transparent;
      border: 2px solid rgba(212,175,55,0.3);
    }
    .checkbox.checked {
      background: linear-gradient(135deg, #ffd700, #d4af37, #b8860b);
      box-shadow: 0 0 16px rgba(212,175,55,0.55);
      border: none;
    }
    .checkbox:not(.checked):hover {
      border-color: #d4af37;
      box-shadow: 0 0 10px rgba(212,175,55,0.35);
    }
    .check-svg { display: none; }
    .checkbox.checked .check-svg { display: block; }

    /* ── Task text ── */
    .task-text-wrap { flex: 1; min-width: 0; }
    .task-text {
      display: block; font-size: 1rem; font-weight: 600;
      color: hsl(45,60%,92%); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      cursor: text; transition: all .2s;
    }
    .task-text.done {
      color: rgba(212,175,55,0.3);
      text-decoration: line-through;
      cursor: default;
    }
    .task-edit-input {
      width: 100%; background: transparent;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      color: hsl(45,60%,92%);
      border: none; border-bottom: 1px solid #d4af37;
      outline: none; padding-bottom: 2px;
    }

    /* ── Delete button ── */
    .delete-btn {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 10px;
      border: none; cursor: pointer; background: transparent;
      color: rgba(212,175,55,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s, color .15s, background .15s;
      font-size: 18px;
    }
    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #8b2342; background: rgba(139,35,66,0.25); }

    /* ── Empty state ── */
    .empty-state {
      padding: 64px 0; display: flex; flex-direction: column;
      align-items: center; gap: 12px; text-align: center;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(107,26,46,0.35);
      border: 1px solid rgba(212,175,55,0.3);
      box-shadow: 0 0 24px rgba(212,175,55,0.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .empty-title { font-size: 1.125rem; font-weight: 800; color: hsl(45,60%,92%); }
    .empty-sub { font-size: 0.875rem; font-weight: 500; color: rgba(212,175,55,0.45); }

    /* ── Clear completed ── */
    .clear-wrap { display: flex; justify-content: flex-end; }
    .clear-btn {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.875rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: none; cursor: pointer; background: transparent;
      color: rgba(212,175,55,0.4);
      padding: 8px 16px; border-radius: 12px;
      transition: color .15s, background .15s;
    }
    .clear-btn:hover { color: #d4af37; background: rgba(212,175,55,0.08); }

    /* ── Bottom line ── */
    .bottom-line {
      height: 1px; opacity: 0.2; margin-top: 8px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;
const { motion, AnimatePresence } = window.Motion || {};

const FILTERS = ["all", "active", "completed"];

function CrownSVG() {
  return (
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className="crown-icon">
      <path d="m2 4 3 12h14l3-12-6 4.5L12 2 8 8.5 2 4z"/>
      <path d="M5 20h14"/>
    </svg>
  );
}

function CheckSVG() {
  return (
    <svg className="check-svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
      stroke="#080808" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  );
}

function PlusSVG() {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  );
}

function XMark() {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2" strokeLinecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  );
}

function App() {
  const [tasks, setTasks] = useState([]);
  const [newText, setNewText] = useState("");
  const [filter, setFilter] = useState("all");
  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState("");
  const [loaded, setLoaded] = useState(false);
  const editRef = useRef(null);

  useEffect(() => {
    const saved = localStorage.getItem("focus-tasks");
    if (saved) { try { setTasks(JSON.parse(saved)); } catch(e){} }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (loaded) localStorage.setItem("focus-tasks", JSON.stringify(tasks));
  }, [tasks, loaded]);

  const addTask = (e) => {
    e.preventDefault();
    if (!newText.trim()) return;
    setTasks(prev => [{ id: Math.random().toString(36).slice(2), text: newText.trim(), completed: false, createdAt: Date.now() }, ...prev]);
    setNewText("");
  };

  const toggle = (id) => setTasks(prev => prev.map(t => t.id === id ? {...t, completed: !t.completed} : t));
  const remove = (id) => setTasks(prev => prev.filter(t => t.id !== id));

  const startEdit = (task) => {
    if (task.completed) return;
    setEditingId(task.id);
    setEditText(task.text);
    setTimeout(() => editRef.current && editRef.current.focus(), 0);
  };

  const saveEdit = () => {
    if (editingId) {
      setTasks(prev => prev.map(t => t.id === editingId ? {...t, text: editText.trim() || t.text} : t));
      setEditingId(null);
    }
  };

  const handleEditKey = (e) => {
    if (e.key === "Enter") saveEdit();
    else if (e.key === "Escape") setEditingId(null);
  };

  const clearCompleted = () => setTasks(prev => prev.filter(t => !t.completed));

  const filtered = tasks.filter(t => {
    if (filter === "active") return !t.completed;
    if (filter === "completed") return t.completed;
    return true;
  });

  const activeCount = tasks.filter(t => !t.completed).length;

  const particles = useMemo(() =>
    Array.from({ length: 12 }, (_, i) => ({
      id: i,
      left: `${8 + Math.random() * 84}%`,
      bottom: `${Math.random() * 30}%`,
      delay: `${(Math.random() * 8).toFixed(1)}s`,
      duration: `${(6 + Math.random() * 8).toFixed(1)}s`,
      size: Math.random() > 0.5 ? 2 : 3,
      opacity: (0.3 + Math.random() * 0.5).toFixed(2),
    })), []);

  if (!loaded) return null;

  const emptyMsg = filter === "completed" ? "Nothing completed yet." : filter === "active" ? "All done!" : "Your list is empty.";

  return (
    <div className="app-wrapper">
      <div className="orb orb-1" />
      <div className="orb orb-2" />
      <div className="orb orb-3" />
      <div className="gold-line" />
      {particles.map(p => (
        <div key={p.id} className="particle" style={{
          left: p.left, bottom: p.bottom,
          width: p.size, height: p.size,
          opacity: p.opacity,
          animationDuration: p.duration,
          animationDelay: p.delay,
        }} />
      ))}

      <div className="main-col">

        <header>
          <div className="header-row">
            <CrownSVG />
            <h1 className="title">Focus.</h1>
          </div>
          <p className="tagline">Conquer your day</p>
          <div className="divider">
            <div className="divider-line divider-line-left" />
            <div className="divider-diamond" />
            <div className="divider-line divider-line-right" />
          </div>
        </header>

        <form className="input-form" onSubmit={addTask}>
          <input
            className="task-input"
            value={newText}
            onChange={e => setNewText(e.target.value)}
            placeholder="Add a new task…"
          />
          <button type="submit" className="add-btn" disabled={!newText.trim()}>
            <PlusSVG />
          </button>
        </form>

        <div className="filter-bar">
          <div className="filter-tabs">
            {FILTERS.map(f => (
              <button key={f} className={`filter-btn${filter === f ? " active" : ""}`} onClick={() => setFilter(f)}>
                {f}
              </button>
            ))}
          </div>
          <span className="task-count"><span>{activeCount}</span> {activeCount === 1 ? "task" : "tasks"} left</span>
        </div>

        <div>
          {filtered.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon"><CrownSVG /></div>
              <p className="empty-title">{emptyMsg}</p>
              {filter === "all" && <p className="empty-sub">Add a task to get started.</p>}
            </div>
          ) : (
            <ul className="task-list">
              {filtered.map((task, idx) => (
                <li
                  key={task.id}
                  className={`task-item${task.completed ? " completed-item" : ""}`}
                  style={{ animationDelay: `${idx * 0.04}s` }}
                >
                  <button
                    className={`checkbox${task.completed ? " checked" : ""}`}
                    onClick={() => toggle(task.id)}
                    aria-label={task.completed ? "Mark incomplete" : "Mark complete"}
                  >
                    <CheckSVG />
                  </button>

                  <div className="task-text-wrap">
                    {editingId === task.id ? (
                      <input
                        ref={editRef}
                        className="task-edit-input"
                        value={editText}
                        onChange={e => setEditText(e.target.value)}
                        onBlur={saveEdit}
                        onKeyDown={handleEditKey}
                      />
                    ) : (
                      <span
                        className={`task-text${task.completed ? " done" : ""}`}
                        onClick={() => startEdit(task)}
                        title={task.completed ? "" : "Click to edit"}
                      >
                        {task.text}
                      </span>
                    )}
                  </div>

                  <button className="delete-btn" onClick={() => remove(task.id)} aria-label="Delete task">
                    <XMark />
                  </button>
                </li>
              ))}
            </ul>
          )}
        </div>

        {tasks.some(t => t.completed) && (
          <div className="clear-wrap">
            <button className="clear-btn" onClick={clearCompleted}>Clear completed</button>
          </div>
        )}

        <div className="bottom-line" />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
